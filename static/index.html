<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Experiment Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="pulse"></span>
                <h1>AI Experiment Dashboard</h1>
            </div>
            <div class="status-bar">
                <span id="api-status" class="status-indicator"></span>
                <span id="api-text">Checking API...</span>
            </div>
        </header>

        <main>
            <section class="experiment-controls card">
                <h2>New Experiment</h2>
                <div class="form-group">
                    <label for="prompt">Prompt</label>
                    <textarea id="prompt" placeholder="Enter your text here..." rows="5"></textarea>
                </div>
                <div class="controls-row">
                    <div class="form-group">
                        <label for="experiment-type">Experiment Type</label>
                        <select id="experiment-type">
                            <!-- Options will be populated dynamically -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="model">Model</label>
                        <select id="model">
                            <!-- Options will be populated dynamically -->
                        </select>
                    </div>
                    <button id="run-btn" class="primary-btn">Analyze & Run</button>
                    <button id="stress-test-btn" class="secondary-btn">Stress Test Context</button>
                </div>
            </section>

            <section class="analysis-grid">
                <div class="card analysis-card" id="token-card">
                    <h3>Token Count</h3>
                    <div class="value-display">
                        <span id="token-count">0</span>
                        <span class="unit">tokens</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar" id="context-progress"></div>
                    </div>
                    <p id="context-info">0% of context limit</p>
                </div>

                <div class="card analysis-card" id="cost-card">
                    <h3>Estimated Cost</h3>
                    <div class="value-display">
                        <span id="total-cost">$0.000000</span>
                    </div>
                    <div class="cost-details">
                        <span>Input: <span id="input-cost">$0.00</span></span>
                        <span>Output: <span id="output-cost">$0.00</span></span>
                    </div>
                </div>
            </section>

            <section class="response-section card">
                <h2>AI Response</h2>
                <div id="ai-response" class="response-content">
                    <p class="placeholder">Response will appear here...</p>
                </div>
            </section>

            <section class="history-section card">
                <h2>Experiment Logs</h2>
                <div class="table-container">
                    <table id="logs-table">
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Model</th>
                                <th>Tokens</th>
                                <th>Cost</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="logs-body">
                            <!-- Logs will be inserted here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 AI Training - Week 4 Submission</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
